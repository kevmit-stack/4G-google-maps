<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4G Google Maps</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body, #map { height: 100%; margin: 0; }
    .popup-table { border-collapse: collapse; width: 100%; font-size: 12px; }
    .popup-table td { padding: 4px 6px; border-bottom: 1px solid #ddd; }
    .popup-table td:first-child { font-weight: bold; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    //var map = L.map('map').setView([33.3, 3.1], 7);
    var map = L.map('map', {
              center: [36.7372, 3.0865],
              zoom: 12
              });
    
    // Définir les couches de base
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri'
    });

    var plan = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    });

    var villes = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}');
    var routes = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}');

    // Afficher satellite par défaut
    satellite.addTo(map);

    // Contrôle utilisateur
    var baseLayers = {
      "🛰️ Satellite": satellite,
      "🗺️ Plan": plan
    };

    var overlays = {
      "🏙️ Villes": villes,
      "🛣️ Routes": routes
    };

    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function toDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function destinationPoint(lat, lon, bearingDeg, distanceMeters) {
      const R = 6378137;
      const brng = toRad(bearingDeg);
      const lat1 = toRad(lat);
      const lon1 = toRad(lon);
      const angDist = distanceMeters / R;

      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(angDist) +
        Math.cos(lat1) * Math.sin(angDist) * Math.cos(brng)
      );

      const lon2 = lon1 + Math.atan2(
        Math.sin(brng) * Math.sin(angDist) * Math.cos(lat1),
        Math.cos(angDist) - Math.sin(lat1) * Math.sin(lat2)
      );

      return [toDeg(lat2), ((toDeg(lon2) + 540) % 360) - 180];
    }

    function buildSector(lat, lon, innerRadius, outerRadius, azimuth, numSteps) {
      const pts = [];

      // cercle complet
      if (azimuth === -1) {
        const steps = Math.max(24, numSteps * 12);

        for (let i = 0; i <= steps; i++) {
          const angle = i * 360 / steps;
          pts.push(destinationPoint(lat, lon, angle, outerRadius));
        }

        if (innerRadius > 0) {
          for (let i = steps; i >= 0; i--) {
            const angle = i * 360 / steps;
            pts.push(destinationPoint(lat, lon, angle, innerRadius));
          }
        } else {
          pts.push([lat, lon]);
        }

        return pts;
      }

      // secteur de 30°
      const halfWidth = 15;
      const start = azimuth - halfWidth;
      const end = azimuth + halfWidth;
      const steps = Math.max(2, numSteps);

      for (let i = 0; i <= steps; i++) {
        const angle = start + (i / steps) * (end - start);
        pts.push(destinationPoint(lat, lon, angle, outerRadius));
      }

      if (innerRadius > 0) {
        for (let i = steps; i >= 0; i--) {
          const angle = start + (i / steps) * (end - start);
          pts.push(destinationPoint(lat, lon, angle, innerRadius));
        }
      } else {
        pts.push([lat, lon]);
      }

      return pts;
    }

    function colorFromAzimuth(azimuth) {
      if (azimuth === -1) return '#e11d48';
      return `hsl(${((azimuth % 360) + 360) % 360}, 80%, 55%)`;
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      const headers = lines.shift().split(';').map(h => h.trim());

      return lines.map(line => {
        const cols = line.split(';').map(v => v.trim());
        const row = {};
        headers.forEach((h, i) => row[h] = cols[i] ?? '');

        row.NumSteps = Number(row.NumSteps || 0);
        row.InnerRadius = Number(row.InnerRadius || 0);
        row.OuterRadius = Number(row.OuterRadius || 0);
        row.LATITUDE = Number(row.LATITUDE || 0);
        row.LONGITUDE = Number(row.LONGITUDE || 0);
        row.ANT_HEIGHT = Number(row.ANT_HEIGHT || 0);
        row.ANT_AZIMUTH = Number(row.ANT_AZIMUTH || 0);

        return row;
      });
    }

    function popupHtml(r) {
      return `
        <div>
          <b>${r.CELLNAME}</b>
          <table class="popup-table">
            <tr><td>NumSteps</td><td>${r.NumSteps}</td></tr>
            <tr><td>InnerRadius</td><td>${r.InnerRadius} m</td></tr>
            <tr><td>OuterRadius</td><td>${r.OuterRadius} m</td></tr>
            <tr><td>Latitude</td><td>${r.LATITUDE}</td></tr>
            <tr><td>Longitude</td><td>${r.LONGITUDE}</td></tr>
            <tr><td>ANT_HEIGHT</td><td>${r.ANT_HEIGHT} m</td></tr>
            <tr><td>ANT_AZIMUTH</td><td>${r.ANT_AZIMUTH}</td></tr>
          </table>
        </div>
      `;
    }

    fetch('./4gsite.csv')
      .then(r => r.text())
      .then(text => {
        const rows = parseCSV(text);
        const group = L.featureGroup().addTo(map);

        rows.forEach(r => {
          const polygon = L.polygon(
            buildSector(
              r.LATITUDE,
              r.LONGITUDE,
              r.InnerRadius,
              r.OuterRadius,
              r.ANT_AZIMUTH,
              r.NumSteps
            ),
            {
              color: colorFromAzimuth(r.ANT_AZIMUTH),
              fillColor: colorFromAzimuth(r.ANT_AZIMUTH),
              fillOpacity: 0.35,
              weight: 1
            }
          ).bindPopup(popupHtml(r));

          polygon.addTo(group);

          L.circleMarker([r.LATITUDE, r.LONGITUDE], {
            radius: 3,
            color: '#fff',
            weight: 1,
            fillColor: '#000',
            fillOpacity: 1
          }).bindTooltip(r.CELLNAME).addTo(group);
        });

        if (rows.length > 0) {
          map.fitBounds(group.getBounds().pad(0.1));
        }
      })
      .catch(err => {
        alert('Erreur chargement CSV: ' + err.message);
      });
  </script>
</body>
</html>
