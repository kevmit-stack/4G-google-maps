<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4G Coverage Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; }
    #map { width: 100vw; height: 100vh; }

    /* ─── Top Bar ─── */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1100;
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px;
      background: linear-gradient(135deg,rgba(0,20,40,.92),rgba(0,40,20,.88));
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(0,255,120,.25);
    }
    #topbar h1 {
      font-size: 15px; font-weight: 700; letter-spacing: 1.5px;
      color: #00ff88; text-transform: uppercase; white-space: nowrap;
    }
    #topbar h1 span { color: #ffffff; }

    /* CSV drop zone */
    #dropzone {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,255,120,.08); border: 1.5px dashed rgba(0,255,120,.4);
      border-radius: 6px; padding: 5px 12px; cursor: pointer;
      transition: all .2s; color: #aaffcc; font-size: 13px;
      white-space: nowrap;
    }
    #dropzone:hover { background: rgba(0,255,120,.18); border-color: #00ff88; }
    #dropzone input { display: none; }
    #dropzone svg { flex-shrink: 0; }

    /* Stats badge */
    #stats {
      margin-left: auto; display: flex; gap: 16px;
      font-size: 12px; color: #aaffcc;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-val { font-size: 18px; font-weight: 700; color: #00ff88; line-height: 1; }
    .stat-lbl { font-size: 10px; opacity: .7; text-transform: uppercase; letter-spacing: .5px; }

    /* Legend */
    #legend {
      position: absolute; bottom: 24px; left: 12px; z-index: 1000;
      background: rgba(0,20,40,.88); border: 1px solid rgba(0,255,120,.25);
      border-radius: 8px; padding: 10px 14px;
      color: #cce; font-size: 12px; min-width: 160px;
    }
    #legend h3 { font-size: 11px; letter-spacing: 1px; color: #00ff88;
                 text-transform: uppercase; margin-bottom: 8px; }
    .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .leg-swatch { width: 22px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* Popup override */
    .leaflet-popup-content-wrapper {
      background: rgba(0,20,40,.95) !important; color: #ccffdd !important;
      border: 1px solid rgba(0,255,120,.3) !important; border-radius: 8px !important;
    }
    .leaflet-popup-tip { background: rgba(0,20,40,.95) !important; }
    .popup-title { font-size: 14px; font-weight: 700; color: #00ff88; margin-bottom: 6px; }
    .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; font-size: 12px; }
    .popup-lbl { opacity: .65; }
    .popup-val { font-weight: 600; color: #aaffcc; }

    /* Loader */
    #loader {
      position: absolute; inset: 0; z-index: 2000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0d1117; gap: 16px; transition: opacity .5s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(0,255,120,.15);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { color: #00ff88; font-size: 13px; letter-spacing: 1px; }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
  <p>Chargement de la carte…</p>
</div>

<!-- Top bar -->
<div id="topbar">
  <h1>4G <span>Coverage</span> Map</h1>

  <label id="dropzone" title="Charger un fichier 4gsite.csv">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Charger CSV (4gsite.csv)
    <input type="file" id="csvFile" accept=".csv,.txt"/>
  </label>

  <div id="stats">
    <div class="stat-item">
      <span class="stat-val" id="statSites">–</span>
      <span class="stat-lbl">Sites</span>
    </div>
    <div class="stat-item">
      <span class="stat-val" id="statCells">–</span>
      <span class="stat-lbl">Cellules</span>
    </div>
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Legend -->
<div id="legend">
  <h3>Légende</h3>
  <div class="leg-row">
    <div class="leg-swatch" style="background:rgba(0,204,68,.6);border:1.5px solid #006622;"></div>
    <span>Secteur actif</span>
  </div>
  <div class="leg-row">
    <div class="leg-swatch" style="background:rgba(0,180,255,.5);border:1.5px solid #004488;border-radius:50%;"></div>
    <span>Cellule omnidirectionelle</span>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   MAP INIT
════════════════════════════════════════ */
var map = L.map('map', { zoomControl: false }).setView([33.8, 2.86], 13);
L.control.zoom({ position: 'bottomright' }).addTo(map);

var satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles © Esri' }
);
var plan = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
});
var villes  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}');
var routes  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}');

satellite.addTo(map);

var baseLayers = { "🛰️ Satellite": satellite, "🗺️ Plan": plan };
var overlays   = { "🏙️ Villes": villes, "🛣️ Routes": routes };
L.control.layers(baseLayers, overlays, { position: 'topright' }).addTo(map);

/* ════════════════════════════════════════
   EMBEDDED DEFAULT CSV
════════════════════════════════════════ */
var DEFAULT_CSV = [
  "CELLNAME;NumSteps;InnerRadius;OuterRadius;LATITUDE;LONGITUDE;ANT_HEIGHT;ANT_AZIMUTH",
  "4A03X001_1;5;0;90;32.95269;3.27861;35;110",
  "4A03X001_2;5;0;90;32.9527;3.27862;35;210",
  "4A03X001_3;5;0;90;32.95271;3.27863;35;350",
  "4A03X002_1;5;0;90;33.80113;2.85747;35;44",
  "4A03X002_2;5;0;90;33.80113;2.85747;35;175",
  "4A03X002_3;5;0;90;33.80113;2.85747;35;300",
  "4A03X003_1;5;0;90;33.80487;2.88224;35;0"
].join("\n");

/* ════════════════════════════════════════
   PARSE CSV  (separateur ; ou ,)
════════════════════════════════════════ */
function parseCSV(text) {
  var lines = text.trim().split(/\r?\n/);
  // detect separator
  var sep = lines[0].includes(';') ? ';' : ',';
  var headers = lines[0].split(sep).map(h => h.trim());
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var vals = lines[i].split(sep);
    if (vals.length < 2) continue;
    var obj = {};
    headers.forEach((h, j) => obj[h] = (vals[j] || '').trim());
    rows.push(obj);
  }
  return rows;
}

/* ════════════════════════════════════════
   GEOMETRY HELPERS
════════════════════════════════════════ */
// Convert a bearing+distance from (lat,lon) to [lat2,lon2]
function offset(lat, lon, meters, bearingDeg) {
  var R      = 6371000;
  var bRad   = bearingDeg * Math.PI / 180;
  var latRad = lat * Math.PI / 180;
  var lonRad = lon * Math.PI / 180;
  var d      = meters / R;
  var lat2   = Math.asin(Math.sin(latRad)*Math.cos(d) +
                         Math.cos(latRad)*Math.sin(d)*Math.cos(bRad));
  var lon2   = lonRad + Math.atan2(
    Math.sin(bRad)*Math.sin(d)*Math.cos(latRad),
    Math.cos(d) - Math.sin(latRad)*Math.sin(lat2)
  );
  return [lat2 * 180/Math.PI, lon2 * 180/Math.PI];
}

/* Build polygon + ring polylines for one sector */
function buildSector(lat, lon, innerR, outerR, azimuth, halfDeg, numSteps) {
  var ARC_PTS = 32;           // smoothness of arc
  var start   = azimuth - halfDeg;
  var end     = azimuth + halfDeg;

  /* outer arc points */
  var outerArc = [];
  for (var i = 0; i <= ARC_PTS; i++) {
    var a = start + (end - start) * i / ARC_PTS;
    outerArc.push(offset(lat, lon, outerR, a));
  }

  /* inner arc points (reversed, for closing polygon) */
  var innerArc = [];
  for (var i = ARC_PTS; i >= 0; i--) {
    var a = start + (end - start) * i / ARC_PTS;
    innerArc.push(innerR > 0 ? offset(lat, lon, innerR, a) : [lat, lon]);
  }

  /* polygon = outer arc → inner arc (or centre) → close */
  var poly;
  if (innerR > 0) {
    poly = outerArc.concat(innerArc);
  } else {
    poly = outerArc.concat([[lat, lon]]);
  }

  /* intermediate ring polylines */
  var rings = [];
  for (var s = 1; s < numSteps; s++) {
    var r = innerR + (outerR - innerR) * s / numSteps;
    var pts = [];
    for (var i = 0; i <= ARC_PTS; i++) {
      var a = start + (end - start) * i / ARC_PTS;
      pts.push(offset(lat, lon, r, a));
    }
    rings.push(pts);
  }

  return { poly: poly, rings: rings };
}

/* ════════════════════════════════════════
   RENDER SECTORS  on the map
════════════════════════════════════════ */
var sectorLayer = L.layerGroup().addTo(map);

function renderData(rows) {
  sectorLayer.clearLayers();

  // site counter (unique by lat+lon rounded)
  var siteSet = new Set();
  var bounds  = [];

  rows.forEach(function(row) {
    var lat     = parseFloat(row['LATITUDE']    || row['Latitude']    || 0);
    var lon     = parseFloat(row['LONGITUDE']   || row['Longitude']   || 0);
    var innerR  = parseFloat(row['InnerRadius'] || 0);
    var outerR  = parseFloat(row['OuterRadius'] || 90);
    var azimuth = parseFloat(row['ANT_AZIMUTH'] || row['Azimuth']     || 0);
    var steps   = parseInt  (row['NumSteps']    || 5);
    var name    = row['CELLNAME'] || row['CellName'] || '–';
    var height  = row['ANT_HEIGHT'] || '–';

    if (isNaN(lat) || isNaN(lon)) return;

    siteSet.add(Math.round(lat*1000)/1000 + ',' + Math.round(lon*1000)/1000);
    bounds.push([lat, lon]);

    // ── OMNI (azimuth = -1) ──────────────────────────
    if (azimuth === -1) {
      L.circle([lat, lon], {
        radius:      outerR,
        color:       '#004499',
        weight:      2,
        fillColor:   '#00aaff',
        fillOpacity: 0.45
      })
      .bindPopup(makePopup(name, lat, lon, 'Omni', innerR, outerR, height, steps))
      .addTo(sectorLayer);
      return;
    }

    // ── DIRECTIONAL SECTOR ───────────────────────────
    var geo = buildSector(lat, lon, innerR, outerR, azimuth, 15, steps);

    /* main sector polygon */
    L.polygon(geo.poly, {
      color:       '#005511',
      weight:      2,
      fillColor:   '#00cc44',
      fillOpacity: 0.55
    })
    .bindPopup(makePopup(name, lat, lon, azimuth+'°', innerR, outerR, height, steps))
    .addTo(sectorLayer);

    /* concentric ring lines */
    geo.rings.forEach(function(pts) {
      L.polyline(pts, { color: '#005511', weight: 1, opacity: 0.7 }).addTo(sectorLayer);
    });

    /* centre dot */
    L.circleMarker([lat, lon], {
      radius: 4, color: '#00ff88', weight: 2,
      fillColor: '#ffffff', fillOpacity: 1
    }).addTo(sectorLayer);
  });

  /* update stats */
  document.getElementById('statSites').textContent = siteSet.size;
  document.getElementById('statCells').textContent = rows.length;

  /* fit map */
  if (bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds).pad(0.3));
  }
}

/* ── HTML popup builder ── */
function makePopup(name, lat, lon, az, innerR, outerR, height, steps) {
  return [
    '<div class="popup-title">📡 ' + name + '</div>',
    '<div class="popup-grid">',
    '  <span class="popup-lbl">Latitude</span><span class="popup-val">' + lat.toFixed(5) + '</span>',
    '  <span class="popup-lbl">Longitude</span><span class="popup-val">' + lon.toFixed(5) + '</span>',
    '  <span class="popup-lbl">Azimuth</span><span class="popup-val">' + az + '</span>',
    '  <span class="popup-lbl">R. int.</span><span class="popup-val">' + innerR + ' m</span>',
    '  <span class="popup-lbl">R. ext.</span><span class="popup-val">' + outerR + ' m</span>',
    '  <span class="popup-lbl">Hauteur</span><span class="popup-val">' + height + ' m</span>',
    '  <span class="popup-lbl">NumSteps</span><span class="popup-val">' + steps + '</span>',
    '</div>'
  ].join('');
}

/* ════════════════════════════════════════
   FILE UPLOAD HANDLER
════════════════════════════════════════ */
document.getElementById('csvFile').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var rows = parseCSV(ev.target.result);
    renderData(rows);
  };
  reader.readAsText(file);
});

/* ════════════════════════════════════════
   BOOT  – load default data
════════════════════════════════════════ */
map.whenReady(function() {
  var rows = parseCSV(DEFAULT_CSV);
  renderData(rows);
  setTimeout(function() {
    document.getElementById('loader').classList.add('hidden');
  }, 500);
});
</script>
</body>
</html>
